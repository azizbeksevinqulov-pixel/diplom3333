<!DOCTYPE html>
<html>
<body>
  <h1>Admin Panel</h1>

  <input id="q" placeholder="Question">
  <input id="o1" placeholder="Option 1">
  <input id="o2" placeholder="Option 2">
  <input id="o3" placeholder="Option 3">
  <input id="o4" placeholder="Option 4">
  <input id="ans" placeholder="Answer index">

  <button onclick="add()">Add Question</button>

  <script>
    function add() {
      fetch("http://localhost:5000/admin/add", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          text: q.value,
          options: [o1.value, o2.value, o3.value, o4.value],
          answer: Number(ans.value)
        })
      });
    }
  </script>
</body>
</html>
